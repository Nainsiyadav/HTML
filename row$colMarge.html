<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>row-Merge</title>
</head>
<body>
    <h1>Merging Rows</h1>
    <table border="black" width="100%">
        <tr>
            <th rowspan="3">April</th>
            <th>march</th>
            <th>may</th>
        </tr>
        <tr>
            <td>12</td>
            <td>19</td>
        </tr>
        <tr>
            <td>27</td>
            <td>76</td>
        </tr>
        <tr>
            <td>rishu</td>
            <td>45</td>
            <td>88</td>
        </tr>
        <tr>
            <td>Mahi</td>
            <td>33</td>
            <td>88</td>
        </tr>
    </table>
</body>
</html>
